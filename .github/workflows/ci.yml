name: CI

on:
  push:
    branches:
      - main

jobs:
  docker-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sre-trainee-app:ci .

      - name: Run container
        run: docker run -d --rm --name sre-trainee-ci -p 8000:8000 sre-trainee-app:ci

      - name: Wait for app startup
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          docker logs sre-trainee-ci || true
          exit 1

      - name: Validate root endpoint
        run: |
          response="$(curl -fsS http://localhost:8000/)"
          test "${response}" = "OK"

      - name: Validate metrics endpoint
        run: |
          metrics="$(curl -fsS http://localhost:8000/metrics)"
          echo "${metrics}" | grep -q "http_requests_total"
          echo "${metrics}" | grep -q "http_errors_total"

      - name: Stop container
        if: always()
        run: docker stop sre-trainee-ci
